name: Release

# Manually triggered. Required repository secrets:
#   NPM_TOKEN   — npm automation token with publish rights to the @erabi scope
#   PYPI_TOKEN  — PyPI API token for the erabi-sdk project
on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish @erabi/* packages to npm"
        type: boolean
        default: true
      publish_pypi:
        description: "Publish erabi-sdk to PyPI"
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and verify
        run: |
          pnpm install --frozen-lockfile
          pip install pydantic cryptography build twine
          pnpm build
          pnpm test

      - name: Publish to npm
        if: ${{ inputs.publish_npm }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Public packages only; private services/apps are skipped by pnpm.
          pnpm publish -r --access public --no-git-checks

      - name: Publish to PyPI
        if: ${{ inputs.publish_pypi }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        working-directory: packages/sdk-py
        run: |
          python -m build
          twine upload dist/*
